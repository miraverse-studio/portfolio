<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GLSL Shader | Mira</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+JP:wght@700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }

.hud {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  pointer-events: none;
  background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, transparent 100%);
}
.hud-title { font-size: 11px; color: rgba(255,255,255,0.5); letter-spacing: 0.2em; }
.hud-stats { font-size: 10px; color: rgba(255,255,255,0.35); text-align: right; line-height: 1.8; }

.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 100%);
}
.home-btn {
  color: rgba(255,255,255,0.4);
  text-decoration: none;
  font-size: 11px;
  letter-spacing: 0.1em;
  padding: 6px 14px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  transition: all 0.2s;
}
.home-btn:hover { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.3); }
.preset-btns { display: flex; gap: 8px; }
.pbt {
  font-size: 10px;
  padding: 5px 12px;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.4);
  cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
  transition: all 0.2s;
}
.pbt.active { border-color: rgba(124,58,237,0.6); color: #a78bfa; background: rgba(124,58,237,0.1); }
.pbt:hover { color: rgba(255,255,255,0.8); }

.tech-badge {
  position: fixed;
  bottom: 52px;
  left: 16px;
  font-size: 10px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.1em;
  line-height: 1.8;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="hud">
  <div class="hud-title">MIRA · GLSL RAYMARCHER</div>
  <div class="hud-stats" id="stats">FPS: --<br>TIME: 0.0s</div>
</div>

<div class="bottom-bar">
  <a href="index.html" class="home-btn">← HOME</a>
  <div class="preset-btns">
    <button class="pbt active" onclick="setMode(0,this)">CORP</button>
    <button class="pbt" onclick="setMode(1,this)">PLASMA</button>
    <button class="pbt" onclick="setMode(2,this)">GRID</button>
    <button class="pbt" onclick="setMode(3,this)">VOID</button>
  </div>
</div>

<div class="tech-badge">
  Raw WebGL 1.0 · No Libraries<br>GLSL Fragment Shader · Raymarching
</div>

<!-- Vertex shader (passthrough) -->
<script id="vs" type="x-shader/x-vertex">
attribute vec2 a_pos;
void main() {
  gl_Position = vec4(a_pos, 0.0, 1.0);
}
</script>

<!-- Fragment shader: raymarcher with SDF primitives -->
<script id="fs" type="x-shader/x-fragment">
precision highp float;

uniform vec2  u_res;
uniform float u_time;
uniform vec2  u_mouse;
uniform int   u_mode;

// ─── Utilities ───────────────────────────────────────────────────────────────
float sdSphere(vec3 p, float r) { return length(p) - r; }

float sdBox(vec3 p, vec3 b) {
  vec3 q = abs(p) - b;
  return length(max(q, 0.0)) + min(max(q.x, max(q.y, q.z)), 0.0);
}

float sdTorus(vec3 p, vec2 t) {
  vec2 q = vec2(length(p.xz) - t.x, p.y);
  return length(q) - t.y;
}

float sdCylinder(vec3 p, float r, float h) {
  vec2 d = abs(vec2(length(p.xz), p.y)) - vec2(r, h);
  return min(max(d.x, d.y), 0.0) + length(max(d, 0.0));
}

mat2 rot(float a) { return mat2(cos(a), -sin(a), sin(a), cos(a)); }

float smin(float a, float b, float k) {
  float h = clamp(0.5 + 0.5*(b-a)/k, 0.0, 1.0);
  return mix(b, a, h) - k*h*(1.0-h);
}

// ─── Scene SDF ───────────────────────────────────────────────────────────────
float scene(vec3 p) {
  float t = u_time;
  float mx = (u_mouse.x / u_res.x - 0.5) * 2.0;
  float my = (u_mouse.y / u_res.y - 0.5) * 2.0;

  if (u_mode == 0) {
    // CORP: floating torus + spheres system
    vec3 p1 = p;
    p1.xz *= rot(t * 0.3 + mx * 1.5);
    p1.yz *= rot(t * 0.2 + my);
    float tor = sdTorus(p1, vec2(1.2, 0.25));

    vec3 p2 = p;
    p2.xz *= rot(-t * 0.5);
    p2.yz *= rot(t * 0.15);
    float tor2 = sdTorus(p2, vec2(0.7, 0.12));

    // Crown of spheres
    float crownd = 1e5;
    for (int i = 0; i < 6; i++) {
      float a = float(i) / 6.0 * 6.2832 + t * 0.4;
      vec3 sp = vec3(cos(a)*1.2, sin(t*0.7 + float(i))*0.1, sin(a)*1.2);
      float r = 0.15 + 0.05 * sin(t*2.0 + float(i)*1.3);
      crownd = smin(crownd, sdSphere(p - sp, r), 0.1);
    }

    float center = sdSphere(p, 0.35 + 0.05*sin(t*3.0));
    return smin(smin(tor, tor2, 0.15), smin(crownd, center, 0.2), 0.1);

  } else if (u_mode == 1) {
    // PLASMA: repeating domain distortion
    vec3 q = p;
    q.xz *= rot(t*0.4 + mx);
    q += 0.5 * sin(q.zxy * 2.0 + t * 1.5);
    q += 0.25 * sin(q.yzx * 4.0 + t * 2.0);
    float plasma = sdSphere(q, 1.2);
    float ring = sdTorus(q, vec2(1.8, 0.08));
    return smin(plasma, ring, 0.3);

  } else if (u_mode == 2) {
    // GRID: infinite box lattice
    vec3 q = p;
    q.xz *= rot(t*0.1 + mx*0.5);
    q.x += t * 0.5;
    vec3 id = floor(q / 2.0);
    vec3 r2 = mod(q, 2.0) - 1.0;
    float phase = sin(id.x*1.3 + id.z*0.7 + t);
    float box = sdBox(r2, vec3(0.35 + 0.1*phase));
    float cyl = sdCylinder(r2, 0.08, 1.0);
    return smin(box, cyl, 0.1);

  } else {
    // VOID: recursive subtraction
    vec3 q = p;
    q.xz *= rot(t*0.25 + mx);
    q.yz *= rot(t*0.18 + my*0.5);
    float d = sdBox(q, vec3(1.0));
    d = max(d, -sdSphere(q, 1.1));
    for (int i = 0; i < 3; i++) {
      vec3 qr = q;
      float a = float(i) * 2.094395 + t * 0.5;
      qr.xz *= rot(a);
      d = max(d, -sdCylinder(qr, 0.3, 2.0));
    }
    float inner = sdSphere(q, 0.5 + 0.1*sin(t*4.0));
    return smin(d, inner, 0.05);
  }
}

// ─── Normal ───────────────────────────────────────────────────────────────────
vec3 normal(vec3 p) {
  float e = 0.001;
  return normalize(vec3(
    scene(p+vec3(e,0,0)) - scene(p-vec3(e,0,0)),
    scene(p+vec3(0,e,0)) - scene(p-vec3(0,e,0)),
    scene(p+vec3(0,0,e)) - scene(p-vec3(0,0,e))
  ));
}

// ─── Color palette ────────────────────────────────────────────────────────────
vec3 palette(float t2, vec3 a, vec3 b2, vec3 c, vec3 d) {
  return a + b2*cos(6.28318*(c*t2+d));
}

vec3 getColor(float d, vec3 p, vec3 n, vec3 rd, float t2) {
  // Mira Corp palette: purple <-> gold
  vec3 col;
  if (u_mode == 0) {
    col = palette(t2 * 0.3 + p.y * 0.5,
      vec3(0.5,0.3,0.7), vec3(0.4,0.3,0.4),
      vec3(1.0,1.0,0.5), vec3(0.0,0.2,0.7));
  } else if (u_mode == 1) {
    col = palette(t2*0.2 + length(p)*0.3,
      vec3(0.8,0.5,0.4), vec3(0.2,0.4,0.2),
      vec3(2.0,1.0,1.0), vec3(0.0,0.25,0.25));
  } else if (u_mode == 2) {
    col = palette(t2*0.15 + p.x*0.2 + p.z*0.2,
      vec3(0.2,0.5,0.8), vec3(0.2,0.3,0.5),
      vec3(1.5,1.0,0.5), vec3(0.8,0.9,0.1));
  } else {
    col = palette(t2*0.1 + length(p.xz)*0.15,
      vec3(0.0,0.0,0.0), vec3(0.5,0.0,0.5),
      vec3(1.0,0.0,1.0), vec3(0.0,0.5,0.5));
  }

  // Lighting
  vec3 lig = normalize(vec3(1.5, 2.0, -1.0));
  float diff = max(dot(n, lig), 0.0);
  float spec = pow(max(dot(reflect(-lig, n), -rd), 0.0), 32.0);
  float rim  = 1.0 - max(dot(n, -rd), 0.0);
  rim = pow(rim, 3.0) * 0.6;

  col = col * (0.15 + 0.85 * diff) + vec3(1.0) * spec * 0.5 + col * rim;

  // Fog
  float fog = exp(-d * 0.12);
  return col * fog;
}

// ─── Main ─────────────────────────────────────────────────────────────────────
void main() {
  vec2 uv = (gl_FragCoord.xy - 0.5 * u_res.xy) / u_res.y;
  float t = u_time;
  float mx = (u_mouse.x / u_res.x - 0.5);
  float my = (u_mouse.y / u_res.y - 0.5);

  // Camera
  vec3 ro = vec3(0.0, 0.5, 3.5 + sin(t*0.2)*0.5);
  ro.xz *= rot(mx * 1.2);
  ro.yz *= rot(-my * 0.8 - 0.3);

  vec3 ta = vec3(0.0);
  vec3 ww = normalize(ta - ro);
  vec3 uu = normalize(cross(ww, vec3(0,1,0)));
  vec3 vv = cross(uu, ww);
  vec3 rd = normalize(uv.x * uu + uv.y * vv + 1.8 * ww);

  // Raymarch
  float dist = 0.0;
  float hit = -1.0;
  for (int i = 0; i < 96; i++) {
    vec3 p = ro + rd * dist;
    float d = scene(p);
    if (d < 0.001) { hit = float(i) / 96.0; break; }
    if (dist > 20.0) break;
    dist += d;
  }

  vec3 col;
  if (hit >= 0.0) {
    vec3 p = ro + rd * dist;
    vec3 n = normal(p);
    col = getColor(dist, p, n, rd, t);
    // AO approximation
    float ao = 1.0 - hit * 0.4;
    col *= ao;
  } else {
    // Background: animated gradient
    float bg = length(uv) * 0.5;
    vec3 sky1 = vec3(0.03, 0.02, 0.08);
    vec3 sky2 = vec3(0.08, 0.04, 0.15);
    col = mix(sky1, sky2, bg) + vec3(0.05, 0.02, 0.1) * sin(t * 0.5 + uv.y * 5.0) * 0.5;
  }

  // Vignette
  float vig = 1.0 - dot(uv * 1.2, uv * 1.2);
  col *= max(vig, 0.0);

  // Gamma
  col = pow(max(col, vec3(0.0)), vec3(0.4545));

  gl_FragColor = vec4(col, 1.0);
}
</script>

<script>
// ─── WebGL Setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

if (!gl) {
  document.body.innerHTML = '<div style="color:white;padding:40px;font-family:monospace;">WebGL not supported on this device.</div>';
}

function compile(type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(sh));
    return null;
  }
  return sh;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, document.getElementById('vs').textContent));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, document.getElementById('fs').textContent));
gl.linkProgram(prog);
gl.useProgram(prog);

// Full-screen quad
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// Uniforms
const uRes   = gl.getUniformLocation(prog, 'u_res');
const uTime  = gl.getUniformLocation(prog, 'u_time');
const uMouse = gl.getUniformLocation(prog, 'u_mouse');
const uMode  = gl.getUniformLocation(prog, 'u_mode');

let mode = 0;
let mouseX = 0, mouseY = 0;
let t0 = performance.now();
let frames = 0, lastFpsTime = 0, fps = 60;

// ─── Resize ────────────────────────────────────────────────────────────────
function resize() {
  // Use devicePixelRatio up to 2 for quality on retina
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width  = window.innerWidth  * dpr;
  canvas.height = window.innerHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

// ─── Input ─────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX * (canvas.width / window.innerWidth);
  mouseY = (window.innerHeight - e.clientY) * (canvas.height / window.innerHeight);
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t2 = e.touches[0];
  mouseX = t2.clientX * (canvas.width / window.innerWidth);
  mouseY = (window.innerHeight - t2.clientY) * (canvas.height / window.innerHeight);
}, { passive: false });

// ─── Mode ─────────────────────────────────────────────────────────────────
function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.pbt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  t0 = performance.now(); // reset time for each mode
}
window.setMode = setMode;

// ─── Render loop ───────────────────────────────────────────────────────────
function render() {
  requestAnimationFrame(render);
  const now = performance.now();
  const t = (now - t0) / 1000;
  frames++;
  if (now - lastFpsTime >= 1000) {
    fps = frames;
    frames = 0;
    lastFpsTime = now;
    document.getElementById('stats').innerHTML =
      `FPS: ${fps}<br>TIME: ${t.toFixed(1)}s`;
  }
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);
  gl.uniform2f(uMouse, mouseX, mouseY);
  gl.uniform1i(uMode, mode);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}
render();
</script>
</body>
</html>
