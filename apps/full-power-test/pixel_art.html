<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ピクセルアート | Mira</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0;padding:0;box-sizing:border-box; }
:root { --bg:#0a0a12; --s1:rgba(255,255,255,0.04); --b1:rgba(255,255,255,0.08); --text:#e2e8f0; --muted:#c7d0dc; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans JP',sans-serif; display:flex; flex-direction:column; height:100vh; overflow:hidden; }

/* TOP NAV */
.nav { display:flex; align-items:center; gap:10px; padding:9px 14px; border-bottom:1px solid var(--b1); flex-shrink:0; background:rgba(10,10,18,0.98); z-index:50; }
.back { color:var(--muted); text-decoration:none; font-size:14px; padding:4px 10px; border:1px solid var(--b1); border-radius:12px; }
.nav-title { font-weight:900; font-size:16px; flex:1; }
.nav-info { font-size:13px; color:var(--muted); font-family:'JetBrains Mono',monospace; }

/* MAIN LAYOUT */
.main { display:flex; flex:1; overflow:hidden; }

/* LEFT TOOLBAR */
.left-bar { width:48px; background:rgba(0,0,0,0.3); border-right:1px solid var(--b1); display:flex; flex-direction:column; align-items:center; padding:10px 0; gap:4px; flex-shrink:0; }
.tool-btn { width:36px; height:36px; border-radius:8px; border:1px solid transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; background:transparent; transition:all 0.15s; }
.tool-btn:hover { background:rgba(255,255,255,0.06); }
.tool-btn.active { background:rgba(124,58,237,0.2); border-color:rgba(124,58,237,0.4); }
.t-sep { width:28px; height:1px; background:var(--b1); margin:4px 0; }

/* CANVAS AREA */
.canvas-area { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; background:repeating-conic-gradient(#0f0f1a 0% 25%, #0a0a12 25% 50%) 0 0 / 20px 20px; position:relative; }
canvas#px { image-rendering:pixelated; image-rendering:-moz-crisp-edges; cursor:crosshair; }

/* RIGHT SIDEBAR */
.right-bar { width:160px; background:rgba(0,0,0,0.3); border-left:1px solid var(--b1); display:flex; flex-direction:column; padding:10px 8px; gap:10px; flex-shrink:0; overflow-y:auto; }
.sidebar-sec { }
.sidebar-label { font-size:12px; color:var(--muted); letter-spacing:0.15em; margin-bottom:6px; font-family:'JetBrains Mono',monospace; }

/* Color palette */
.palette { display:grid; grid-template-columns:repeat(6,1fr); gap:3px; }
.swatch { width:22px; height:22px; border-radius:4px; cursor:pointer; border:2px solid transparent; transition:all 0.1s; }
.swatch.active { border-color:#fff; transform:scale(1.1); }
.swatch.custom { background: linear-gradient(135deg,#f87171,#a78bfa,#34d399,#f59e0b); }

/* Current color + picker */
.cur-color-row { display:flex; align-items:center; gap:8px; }
.cur-color { width:32px; height:32px; border-radius:8px; border:2px solid rgba(255,255,255,0.2); cursor:pointer; }
.cur-hex { font-size:13px; font-family:'JetBrains Mono',monospace; color:var(--muted); flex:1; background:transparent; border:1px solid var(--b1); padding:3px 6px; border-radius:6px; color:var(--text); outline:none; }

/* Grid size selector */
.grid-btns { display:flex; gap:4px; flex-wrap:wrap; }
.grid-btn { font-size:13px; padding:3px 7px; border-radius:6px; cursor:pointer; border:1px solid var(--b1); background:transparent; color:var(--muted); font-family:'JetBrains Mono',monospace; }
.grid-btn.active { border-color:rgba(124,58,237,0.4); color:#a78bfa; background:rgba(124,58,237,0.08); }

/* Frames (animation) */
.frame-list { display:flex; flex-direction:column; gap:4px; }
.frame-item { display:flex; align-items:center; gap:6px; padding:4px 6px; border-radius:6px; background:var(--s1); border:1px solid var(--b1); cursor:pointer; }
.frame-thumb { width:24px; height:24px; border-radius:3px; image-rendering:pixelated; border:1px solid rgba(255,255,255,0.08); }
.frame-num { font-size:13px; color:var(--muted); font-family:'JetBrains Mono',monospace; }
.frame-item.active { border-color:rgba(124,58,237,0.4); }
.frame-add { font-size:13px; padding:4px; text-align:center; color:#a78bfa; cursor:pointer; }
.frame-add:hover { color:#a78bfa; }

/* Bottom action bar */
.bottom-bar { padding:6px 12px; border-top:1px solid var(--b1); display:flex; gap:6px; align-items:center; background:rgba(10,10,18,0.98); flex-shrink:0; }
.act-btn { font-size:13px; padding:5px 12px; border-radius:8px; cursor:pointer; border:1px solid var(--b1); background:var(--s1); color:var(--muted); font-family:inherit; transition:all 0.2s; }
.act-btn:hover { color:#fff; }
.act-btn.primary { border-color:rgba(124,58,237,0.3); color:#a78bfa; }
.act-btn.green { border-color:rgba(16,185,129,0.3); color:#34d399; }
.zoom-info { font-size:13px; color:var(--muted); font-family:'JetBrains Mono',monospace; margin-left:auto; }

/* Color input hidden */
#colorPicker { position:absolute; opacity:0; width:0; height:0; }
</style>
</head>
<body>
<div class="nav">
  <a href="index.html" class="back">← ホーム</a>
  <div class="nav-title">🎨 ピクセルアートエディター</div>
  <div class="nav-info" id="navInfo">16×16</div>
</div>

<div class="main">
  <!-- LEFT TOOLS -->
  <div class="left-bar">
    <button class="tool-btn active" id="tool-pencil" onclick="setTool('pencil',this)" title="ペン(1px)">✏️</button>
    <button class="tool-btn" id="tool-brush" onclick="setTool('brush',this)" title="ブラシ(2px)">🖌️</button>
    <button class="tool-btn" id="tool-eraser" onclick="setTool('eraser',this)" title="消しゴム">⬜</button>
    <button class="tool-btn" id="tool-fill" onclick="setTool('fill',this)" title="塗りつぶし">🪣</button>
    <button class="tool-btn" id="tool-picker" onclick="setTool('picker',this)" title="スポイト">💉</button>
    <div class="t-sep"></div>
    <button class="tool-btn" onclick="undo()" title="Undo">↩</button>
    <button class="tool-btn" onclick="redo()" title="Redo">↪</button>
    <div class="t-sep"></div>
    <button class="tool-btn" onclick="zoomIn()" title="拡大">🔍</button>
    <button class="tool-btn" onclick="zoomOut()" title="縮小">🔎</button>
    <div class="t-sep"></div>
    <button class="tool-btn" onclick="toggleGrid()" id="grid-toggle" title="グリッド">⊞</button>
    <button class="tool-btn" onclick="playAnim()" id="anim-btn" title="アニメーション再生">▶</button>
  </div>

  <!-- CANVAS -->
  <div class="canvas-area" id="canvasArea">
    <canvas id="px"></canvas>
    <input type="color" id="colorPicker">
  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="right-bar">
    <div class="sidebar-sec">
      <div class="sidebar-label">CURRENT</div>
      <div class="cur-color-row">
        <div class="cur-color" id="curColorDisp" onclick="document.getElementById('colorPicker').click()"></div>
        <input type="text" class="cur-hex" id="hexInput" value="#7c3aed" maxlength="7" onchange="setColorFromHex(this.value)">
      </div>
    </div>

    <div class="sidebar-sec">
      <div class="sidebar-label">PALETTE</div>
      <div class="palette" id="paletteGrid"></div>
    </div>

    <div class="sidebar-sec">
      <div class="sidebar-label">CANVAS SIZE</div>
      <div class="grid-btns">
        <button class="grid-btn active" onclick="resizeCanvas(16,this)">16</button>
        <button class="grid-btn" onclick="resizeCanvas(32,this)">32</button>
        <button class="grid-btn" onclick="resizeCanvas(64,this)">64</button>
      </div>
    </div>

    <div class="sidebar-sec">
      <div class="sidebar-label">FRAMES</div>
      <div class="frame-list" id="frameList"></div>
      <div class="frame-add" onclick="addFrame()">+ フレーム追加</div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <button class="act-btn" onclick="clearCanvas()">🗑 クリア</button>
  <button class="act-btn" onclick="flipH()">↔ 反転</button>
  <button class="act-btn" onclick="rotateRight()">↻ 回転</button>
  <button class="act-btn primary" onclick="saveProject()">💾 保存</button>
  <button class="act-btn green" onclick="exportPNG()">📤 PNG</button>
  <div class="zoom-info" id="zoomInfo">×8</div>
</div>

<script>
// ─── Palette ──────────────────────────────────────────────────────────────────
const PALETTE = [
  '#000000','#1a1a2e','#16213e','#0f3460','#533483','#7c3aed',
  '#a78bfa','#c4b5fd','#e2e8f0','#ffffff','#f59e0b','#fbbf24',
  '#f87171','#ef4444','#dc2626','#10b981','#34d399','#6ee7b7',
  '#3b82f6','#60a5fa','#93c5fd','#f472b6','#ec4899','#db2777',
  '#4ade80','#a3e635','#facc15','#fb923c','#94a3b8','#475569',
  '#transparent','#transparent','#transparent','#transparent','#transparent','#transparent',
];
const TRANSPARENT = 'rgba(0,0,0,0)';

let currentColor = '#7c3aed';
let tool = 'pencil';
let gridSize = 16;
let zoom = 16;
let showGrid = true;

// ─── Data model ───────────────────────────────────────────────────────────────
// frames: array of Uint32Array (ARGB packed ints)
let frames = [];
let currentFrame = 0;
let undoStack = [], redoStack = [];

function makeFrame() {
  return new Uint32Array(gridSize * gridSize);
}

function initFrames() {
  frames = [makeFrame()];
  currentFrame = 0;
}
initFrames();

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const pxCanvas = document.getElementById('px');
const pxCtx    = pxCanvas.getContext('2d');
let displayW, displayH;

function setupCanvas() {
  displayW = gridSize * zoom;
  displayH = gridSize * zoom;
  pxCanvas.width  = gridSize;
  pxCanvas.height = gridSize;
  pxCanvas.style.width  = displayW + 'px';
  pxCanvas.style.height = displayH + 'px';
  document.getElementById('navInfo').textContent = `${gridSize}×${gridSize}`;
  document.getElementById('zoomInfo').textContent = '×' + zoom;
  renderCanvas();
}
setupCanvas();

// ─── Color to 32-bit ─────────────────────────────────────────────────────────
function hexToRgba(hex) {
  if (hex === 'transparent') return 0;
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (255<<24) | (b<<16) | (g<<8) | r;
}
function packedToRgba(v) {
  if (v === 0) return 'rgba(0,0,0,0)';
  const r = v & 0xff, g = (v>>8)&0xff, b = (v>>16)&0xff, a = (v>>>24)&0xff;
  return `rgba(${r},${g},${b},${a/255})`;
}
function packedToHex(v) {
  if (v === 0) return '#000000';
  const r = v & 0xff, g = (v>>8)&0xff, b = (v>>16)&0xff;
  return '#' + [r,g,b].map(c=>c.toString(16).padStart(2,'0')).join('');
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderCanvas() {
  const data = frames[currentFrame];
  const imgData = pxCtx.createImageData(gridSize, gridSize);
  for (let i = 0; i < gridSize*gridSize; i++) {
    const v = data[i];
    const r = v & 0xff, g = (v>>8)&0xff, b = (v>>16)&0xff, a = (v>>>24)&0xff;
    imgData.data[i*4]   = r;
    imgData.data[i*4+1] = g;
    imgData.data[i*4+2] = b;
    imgData.data[i*4+3] = v === 0 ? 0 : a;
  }
  pxCtx.putImageData(imgData, 0, 0);
  updateFrameThumb(currentFrame);
}

// ─── Palette UI ───────────────────────────────────────────────────────────────
function buildPalette() {
  const grid = document.getElementById('paletteGrid');
  grid.innerHTML = '';
  PALETTE.forEach((c, i) => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (c===currentColor?' active':'');
    if (c === '#transparent') {
      sw.style.background = 'repeating-conic-gradient(#aaa 0% 25%,#fff 25% 50%) 0 0 / 8px 8px';
      sw.onclick = () => { currentColor = 'transparent'; updateColorUI(); };
    } else {
      sw.style.background = c;
      sw.onclick = () => { currentColor = c; updateColorUI(); sw.parentElement.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active')); sw.classList.add('active'); };
    }
    grid.appendChild(sw);
  });
}
buildPalette();

function updateColorUI() {
  const disp = document.getElementById('curColorDisp');
  const hexIn = document.getElementById('hexInput');
  if (currentColor === 'transparent') {
    disp.style.background = 'repeating-conic-gradient(#aaa 0% 25%,#fff 25% 50%) 0 0 / 8px 8px';
    hexIn.value = 'transparent';
  } else {
    disp.style.background = currentColor;
    hexIn.value = currentColor;
  }
}
updateColorUI();

document.getElementById('colorPicker').addEventListener('input', e => {
  currentColor = e.target.value;
  updateColorUI();
});

function setColorFromHex(hex) {
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) { currentColor = hex; updateColorUI(); }
}
window.setColorFromHex = setColorFromHex;

// ─── Tool switching ───────────────────────────────────────────────────────────
function setTool(t, btn) {
  tool = t;
  document.querySelectorAll('.tool-btn[id^=tool-]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
window.setTool = setTool;

// ─── Drawing ─────────────────────────────────────────────────────────────────
let drawing = false;
let lastDraw = null;

function getPixelCoord(e) {
  const rect = pxCanvas.getBoundingClientRect();
  const px = (e.clientX ?? e.touches[0].clientX) - rect.left;
  const py = (e.clientY ?? e.touches[0].clientY) - rect.top;
  const x  = Math.floor(px / zoom);
  const y  = Math.floor(py / zoom);
  return { x: Math.max(0,Math.min(gridSize-1,x)), y: Math.max(0,Math.min(gridSize-1,y)) };
}

function drawPixel(x, y) {
  if (tool === 'picker') {
    const v = frames[currentFrame][y*gridSize+x];
    currentColor = v === 0 ? 'transparent' : packedToHex(v);
    updateColorUI();
    return;
  }
  if (tool === 'fill') {
    floodFill(x, y);
    return;
  }

  const packed = currentColor === 'transparent' ? 0 : hexToRgba(currentColor);
  const brush  = tool === 'brush' ? 2 : 1;
  const erase  = tool === 'eraser';

  for (let by = -Math.floor((brush-1)/2); by <= Math.floor(brush/2); by++) {
    for (let bx = -Math.floor((brush-1)/2); bx <= Math.floor(brush/2); bx++) {
      const px = x+bx, py = y+by;
      if (px<0||px>=gridSize||py<0||py>=gridSize) continue;
      frames[currentFrame][py*gridSize+px] = erase ? 0 : packed;
    }
  }
  renderCanvas();
}

function floodFill(x, y) {
  const target = frames[currentFrame][y*gridSize+x];
  const fill   = currentColor === 'transparent' ? 0 : hexToRgba(currentColor);
  if (target === fill) return;
  const stack  = [[x,y]];
  const visited = new Uint8Array(gridSize*gridSize);
  while (stack.length) {
    const [cx,cy] = stack.pop();
    if (cx<0||cx>=gridSize||cy<0||cy>=gridSize) continue;
    const idx = cy*gridSize+cx;
    if (visited[idx] || frames[currentFrame][idx] !== target) continue;
    visited[idx] = 1;
    frames[currentFrame][idx] = fill;
    stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
  }
  renderCanvas();
}

pxCanvas.addEventListener('pointerdown', e => {
  drawing = true;
  snapshotUndo();
  const {x,y} = getPixelCoord(e);
  drawPixel(x, y);
  lastDraw = {x,y};
});
pxCanvas.addEventListener('pointermove', e => {
  if (!drawing) return;
  const {x,y} = getPixelCoord(e);
  if (lastDraw && lastDraw.x===x && lastDraw.y===y) return;
  // Bresenham line for smooth strokes
  if (lastDraw && tool !== 'fill' && tool !== 'picker') {
    bresenham(lastDraw.x, lastDraw.y, x, y);
  } else {
    drawPixel(x, y);
  }
  lastDraw = {x,y};
});
pxCanvas.addEventListener('pointerup', () => { drawing = false; lastDraw = null; });
pxCanvas.addEventListener('touchstart', e => { e.preventDefault(); }, {passive:false});

function bresenham(x0,y0,x1,y1) {
  let dx=Math.abs(x1-x0), dy=Math.abs(y1-y0);
  let sx=x0<x1?1:-1, sy=y0<y1?1:-1, err=dx-dy;
  while(true) {
    drawPixel(x0,y0);
    if(x0===x1&&y0===y1) break;
    const e2=2*err;
    if(e2>-dy){err-=dy;x0+=sx;}
    if(e2<dx){err+=dx;y0+=sy;}
  }
}

// ─── Undo/Redo ────────────────────────────────────────────────────────────────
function snapshotUndo() {
  undoStack.push(frames.map(f => new Uint32Array(f)));
  if (undoStack.length > 30) undoStack.shift();
  redoStack = [];
}
function undo() {
  if (!undoStack.length) return;
  redoStack.push(frames.map(f => new Uint32Array(f)));
  frames = undoStack.pop();
  renderCanvas(); renderFrameList();
}
function redo() {
  if (!redoStack.length) return;
  undoStack.push(frames.map(f => new Uint32Array(f)));
  frames = redoStack.pop();
  renderCanvas(); renderFrameList();
}
window.undo = undo; window.redo = redo;

// ─── Grid display ─────────────────────────────────────────────────────────────
function toggleGrid() {
  showGrid = !showGrid;
  document.getElementById('grid-toggle').classList.toggle('active', showGrid);
  const area = document.getElementById('canvasArea');
  if (showGrid) {
    pxCanvas.style.boxShadow = `0 0 0 ${zoom/gridSize}px rgba(255,255,255,0.03) inset`;
  } else {
    pxCanvas.style.boxShadow = 'none';
  }
}
window.toggleGrid = toggleGrid;

// ─── Zoom ────────────────────────────────────────────────────────────────────
function zoomIn()  { zoom = Math.min(32, zoom*2); setupCanvas(); }
function zoomOut() { zoom = Math.max(2, zoom/2); setupCanvas(); }
window.zoomIn = zoomIn; window.zoomOut = zoomOut;

// ─── Transforms ──────────────────────────────────────────────────────────────
function flipH() {
  snapshotUndo();
  const f = frames[currentFrame];
  const N = new Uint32Array(gridSize*gridSize);
  for (let y=0;y<gridSize;y++) for (let x=0;x<gridSize;x++)
    N[y*gridSize+(gridSize-1-x)] = f[y*gridSize+x];
  frames[currentFrame] = N;
  renderCanvas();
}
function rotateRight() {
  snapshotUndo();
  const f = frames[currentFrame];
  const N = new Uint32Array(gridSize*gridSize);
  for (let y=0;y<gridSize;y++) for (let x=0;x<gridSize;x++)
    N[x*gridSize+(gridSize-1-y)] = f[y*gridSize+x];
  frames[currentFrame] = N;
  renderCanvas();
}
window.flipH = flipH; window.rotateRight = rotateRight;

// ─── Resize canvas ────────────────────────────────────────────────────────────
function resizeCanvas(size, btn) {
  snapshotUndo();
  const old = frames.map(f => ({data:f, size:gridSize}));
  gridSize = size;
  frames = old.map(({data, size: oldSize}) => {
    const newF = makeFrame();
    const minSize = Math.min(oldSize, size);
    for (let y=0;y<minSize;y++) for (let x=0;x<minSize;x++)
      newF[y*size+x] = data[y*oldSize+x];
    return newF;
  });
  document.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  zoom = size === 64 ? 8 : size === 32 ? 12 : 16;
  setupCanvas();
  renderFrameList();
}
window.resizeCanvas = resizeCanvas;

// ─── Frames ───────────────────────────────────────────────────────────────────
function addFrame() {
  snapshotUndo();
  frames.push(makeFrame());
  currentFrame = frames.length - 1;
  renderCanvas();
  renderFrameList();
}
window.addFrame = addFrame;

function switchFrame(i) {
  currentFrame = i;
  renderCanvas();
  renderFrameList();
}
window.switchFrame = switchFrame;

function renderFrameList() {
  const list = document.getElementById('frameList');
  list.innerHTML = '';
  frames.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'frame-item' + (i===currentFrame?' active':'');
    item.onclick = () => switchFrame(i);
    const thumb = document.createElement('canvas');
    thumb.className = 'frame-thumb';
    thumb.width = gridSize; thumb.height = gridSize;
    thumb.style.width = '24px'; thumb.style.height = '24px';
    item.appendChild(thumb);
    const num = document.createElement('div');
    num.className = 'frame-num'; num.textContent = 'F' + (i+1);
    item.appendChild(num);
    list.appendChild(item);
    // Draw thumb
    drawFrameToCanvas(f, thumb.getContext('2d'));
  });
}

function drawFrameToCanvas(data, ctx) {
  const imgData = ctx.createImageData(gridSize, gridSize);
  for (let i=0;i<gridSize*gridSize;i++) {
    const v = data[i];
    imgData.data[i*4]   = v&0xff;
    imgData.data[i*4+1] = (v>>8)&0xff;
    imgData.data[i*4+2] = (v>>16)&0xff;
    imgData.data[i*4+3] = v===0?0:255;
  }
  ctx.putImageData(imgData, 0, 0);
}

function updateFrameThumb(i) {
  const thumbs = document.querySelectorAll('.frame-thumb');
  if (thumbs[i]) drawFrameToCanvas(frames[i], thumbs[i].getContext('2d'));
}

renderFrameList();

// ─── Animation ────────────────────────────────────────────────────────────────
let animInterval = null;
function playAnim() {
  if (animInterval) {
    clearInterval(animInterval);
    animInterval = null;
    document.getElementById('anim-btn').textContent = '▶';
    document.getElementById('anim-btn').classList.remove('active');
    return;
  }
  let frame = 0;
  document.getElementById('anim-btn').textContent = '⏸';
  document.getElementById('anim-btn').classList.add('active');
  animInterval = setInterval(() => {
    currentFrame = (currentFrame + 1) % frames.length;
    renderCanvas();
  }, 200);
}
window.playAnim = playAnim;

// ─── Save / Export ────────────────────────────────────────────────────────────
const STORAGE_KEY = 'mira-pixel-v1';

function saveProject() {
  const d = {
    gridSize,
    frames: frames.map(f => Array.from(f)),
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
  const info = document.getElementById('navInfo');
  info.textContent = '保存完了! (' + gridSize + '×' + gridSize + ')';
  setTimeout(() => { info.textContent = gridSize+'×'+gridSize; }, 1500);
}
window.saveProject = saveProject;

function exportPNG() {
  const scale = Math.max(1, Math.floor(512 / gridSize));
  const exp   = document.createElement('canvas');
  exp.width   = gridSize * scale; exp.height = gridSize * scale;
  const ectx  = exp.getContext('2d');
  ectx.imageSmoothingEnabled = false;
  ectx.drawImage(pxCanvas, 0, 0, gridSize*scale, gridSize*scale);
  const a = document.createElement('a');
  a.href = exp.toDataURL('image/png');
  a.download = 'pixel_art.png';
  a.click();
}
window.exportPNG = exportPNG;

function clearCanvas() {
  if (!confirm('クリアしますか？')) return;
  snapshotUndo();
  frames[currentFrame] = makeFrame();
  renderCanvas();
}
window.clearCanvas = clearCanvas;

// ─── Load saved project ───────────────────────────────────────────────────────
try {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
  if (saved) {
    gridSize = saved.gridSize;
    frames = saved.frames.map(f => new Uint32Array(f));
    setupCanvas();
    renderFrameList();
  }
} catch(e) {}

// ─── Draw starter art (Mira logo pixel) ───────────────────────────────
if (frames[0].every(v => v === 0)) {
  // Draw simple crown/star pattern
  const f = frames[0];
  const purple = hexToRgba('#7c3aed');
  const gold   = hexToRgba('#f59e0b');
  const white  = hexToRgba('#ffffff');
  const cx = Math.floor(gridSize/2), cy = Math.floor(gridSize/2);
  // Letter A
  for (let y=3;y<gridSize-3;y++) {
    const progress = (y-3)/(gridSize-6);
    const halfW = Math.round((1-progress)*gridSize*0.22);
    // Left stroke
    const lx = cx - halfW;
    if (lx>=0&&lx<gridSize) f[y*gridSize+lx] = purple;
    // Right stroke
    const rx = cx + halfW;
    if (rx>=0&&rx<gridSize) f[y*gridSize+rx] = purple;
    // Crossbar
    if (progress > 0.35 && progress < 0.55) {
      for (let x=lx;x<=rx;x++) if (x>=0&&x<gridSize) f[y*gridSize+x] = gold;
    }
  }
  renderCanvas();
  renderFrameList();
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'p' || e.key === 'P') { setTool('pencil', document.getElementById('tool-pencil')); }
  if (e.key === 'b' || e.key === 'B') { setTool('brush',  document.getElementById('tool-brush')); }
  if (e.key === 'e' || e.key === 'E') { setTool('eraser', document.getElementById('tool-eraser')); }
  if (e.key === 'f' || e.key === 'F') { setTool('fill',   document.getElementById('tool-fill')); }
  if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.shiftKey ? redo() : undo(); e.preventDefault(); }
  if ((e.ctrlKey||e.metaKey) && e.key==='s') { saveProject(); e.preventDefault(); }
});
</script>
