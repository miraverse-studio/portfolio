<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GPUパーティクル | Mira</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'JetBrains Mono',monospace; }
canvas { display:block; width:100vw; height:100vh; touch-action:none; }
.hud {
  position:fixed; top:0; left:0; right:0; padding:14px 16px;
  display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(180deg,rgba(0,0,0,0.6) 0%,transparent 100%);
  pointer-events:none;
}
.hud-title { font-size:11px; color:rgba(255,255,255,0.4); letter-spacing:0.2em; }
.hud-stats { font-size:10px; color:rgba(255,255,255,0.25); text-align:right; line-height:1.8; }
.bottom {
  position:fixed; bottom:0; left:0; right:0; padding:12px 16px;
  display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(0deg,rgba(0,0,0,0.6) 0%,transparent 100%);
}
.btn { font-size:10px; padding:5px 14px; border-radius:16px; cursor:pointer; font-family:'JetBrains Mono',monospace; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.4); }
.btn:hover { color:rgba(255,255,255,0.8); }
.btn.active { border-color:rgba(124,58,237,0.5); color:#a78bfa; background:rgba(124,58,237,0.1); }
.btns { display:flex; gap:8px; }
.back-btn { color:rgba(255,255,255,0.3); text-decoration:none; font-size:11px; padding:5px 12px; border:1px solid rgba(255,255,255,0.1); border-radius:16px; }
.tech-note { position:fixed; bottom:44px; left:16px; font-size:9px; color:rgba(255,255,255,0.2); line-height:1.8; letter-spacing:0.05em; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">
  <div class="hud-title">MIRA · GPU PARTICLES · WebGL INSTANCING</div>
  <div class="hud-stats" id="stats">FPS: --<br>Particles: 0</div>
</div>
<div class="bottom">
  <a href="index.html" class="back-btn">← HOME</a>
  <div class="btns">
    <button class="btn active" onclick="setMode(0,this)">FLOAT</button>
    <button class="btn" onclick="setMode(1,this)">ORBIT</button>
    <button class="btn" onclick="setMode(2,this)">EXPLODE</button>
    <button class="btn" onclick="setMode(3,this)">VORTEX</button>
  </div>
</div>
<div class="tech-note">
  Raw WebGL 1.0 · ANGLE_instanced_arrays (GPU instancing)<br>
  10,000 particles · 1 draw call · Zero libraries
</div>

<!-- Vertex shader: position each particle instance -->
<script id="vs" type="x-shader/x-vertex">
attribute vec2 a_quad;      /* -1..1 quad corner */
attribute vec2 a_pos;       /* particle world pos (per-instance) */
attribute float a_life;     /* 0..1 life ratio */
attribute float a_size;     /* particle radius */
attribute float a_hue;      /* color hue 0..1 */

uniform vec2  u_res;
uniform float u_time;

varying float v_life;
varying float v_hue;
varying vec2  v_uv;

void main() {
  v_life = a_life;
  v_hue  = a_hue;
  v_uv   = a_quad;

  /* billboard: offset by quad corner in screen space */
  vec2 screen_pos = (a_pos / u_res * 2.0 - 1.0) * vec2(1.0, -1.0);
  vec2 offset = a_quad * a_size * (2.0 / u_res);
  gl_Position = vec4(screen_pos + offset, 0.0, 1.0);
}
</script>

<!-- Fragment shader: soft circle with color -->
<script id="fs" type="x-shader/x-fragment">
precision mediump float;
varying float v_life;
varying float v_hue;
varying vec2  v_uv;

vec3 hsv(float h, float s, float v) {
  vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
  vec3 p = abs(fract(vec3(h,h,h) + K.xyz) * 6.0 - K.www);
  return v * mix(K.xxx, clamp(p-K.xxx, 0.0, 1.0), s);
}

void main() {
  float d = length(v_uv);
  if (d > 1.0) discard;
  float alpha = (1.0 - d*d) * v_life;
  vec3 color = hsv(v_hue, 0.7, 1.0);
  gl_FragColor = vec4(color, alpha * 0.85);
}
</script>

<script>
const N = 10000;  // particle count
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
const ext = gl.getExtension('ANGLE_instanced_arrays');

if (!gl || !ext) {
  document.body.innerHTML = '<div style="color:white;padding:40px;">WebGL instancing not supported</div>';
}

// ─── Compile shader ───────────────────────────────────────────────────────────
function compileShader(type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(sh)); return null;
  }
  return sh;
}
const prog = gl.createProgram();
gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, document.getElementById('vs').textContent));
gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, document.getElementById('fs').textContent));
gl.linkProgram(prog);
gl.useProgram(prog);

// ─── Quad (2 triangles = 1 billboard) ────────────────────────────────────────
const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aQuad = gl.getAttribLocation(prog, 'a_quad');
gl.enableVertexAttribArray(aQuad);
gl.vertexAttribPointer(aQuad, 2, gl.FLOAT, false, 0, 0);

// ─── Instance buffers ─────────────────────────────────────────────────────────
const posData  = new Float32Array(N * 2); // xy
const lifeData = new Float32Array(N);
const sizeData = new Float32Array(N);
const hueData  = new Float32Array(N);

const posBuf  = gl.createBuffer();
const lifeBuf = gl.createBuffer();
const sizeBuf = gl.createBuffer();
const hueBuf  = gl.createBuffer();

const aPos  = gl.getAttribLocation(prog, 'a_pos');
const aLife = gl.getAttribLocation(prog, 'a_life');
const aSize = gl.getAttribLocation(prog, 'a_size');
const aHue  = gl.getAttribLocation(prog, 'a_hue');

gl.enableVertexAttribArray(aPos);
gl.enableVertexAttribArray(aLife);
gl.enableVertexAttribArray(aSize);
gl.enableVertexAttribArray(aHue);

// ─── Uniforms ─────────────────────────────────────────────────────────────────
const uRes  = gl.getUniformLocation(prog, 'u_res');
const uTime = gl.getUniformLocation(prog, 'u_time');

// ─── Particle data ────────────────────────────────────────────────────────────
const vx = new Float32Array(N);
const vy = new Float32Array(N);
const age = new Float32Array(N);
const maxAge = new Float32Array(N);

function initParticle(i) {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  posData[i*2]   = cx + (Math.random()-0.5) * canvas.width * 0.6;
  posData[i*2+1] = cy + (Math.random()-0.5) * canvas.height * 0.6;
  vx[i] = (Math.random()-0.5) * 2;
  vy[i] = (Math.random()-0.5) * 2;
  age[i] = Math.random() * 200;
  maxAge[i] = 150 + Math.random() * 250;
  sizeData[i] = 2 + Math.random() * 5;
  hueData[i]  = Math.random();
}

for (let i = 0; i < N; i++) initParticle(i);

// ─── Mouse / Touch ────────────────────────────────────────────────────────────
let mx = -9999, my = -9999, mouseDown = false;
canvas.addEventListener('mousemove', e => { mx = e.clientX * dpr; my = e.clientY * dpr; });
canvas.addEventListener('mousedown', () => { mouseDown = true; });
canvas.addEventListener('mouseup', () => { mouseDown = false; });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  mx = e.touches[0].clientX * dpr; my = e.touches[0].clientY * dpr;
}, {passive:false});
canvas.addEventListener('touchstart', e => { mouseDown = true; }, {passive:false});
canvas.addEventListener('touchend', () => { mouseDown = false; });

// ─── Mode ─────────────────────────────────────────────────────────────────────
let mode = 0;
function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
window.setMode = setMode;

// ─── Resize ───────────────────────────────────────────────────────────────────
let dpr = 1;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width  = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

// ─── Simulation ───────────────────────────────────────────────────────────────
function simulate(t) {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const W = canvas.width, H = canvas.height;

  for (let i = 0; i < N; i++) {
    const x = posData[i*2], y = posData[i*2+1];

    // Mode physics
    let ax = 0, ay = 0;
    if (mode === 0) {
      // FLOAT: gentle gravity + buoyancy
      ay = -0.02;
      ax = Math.sin(t * 0.3 + i * 0.01) * 0.03;
    } else if (mode === 1) {
      // ORBIT: centripetal
      const dx = x - cx, dy = y - cy;
      const dist = Math.sqrt(dx*dx + dy*dy) + 0.1;
      const orb = 0.15 / dist;
      ax = -dy * orb; ay = dx * orb;
      ax += -dx * 0.001; ay += -dy * 0.001;
    } else if (mode === 2) {
      // EXPLODE: radial burst
      const dx = x - cx, dy = y - cy;
      const dist = Math.sqrt(dx*dx + dy*dy) + 1;
      ax = dx / dist * 0.5;
      ay = dy / dist * 0.5;
    } else {
      // VORTEX: spiral
      const dx = x - cx, dy = y - cy;
      const dist = Math.sqrt(dx*dx + dy*dy) + 1;
      const s = Math.sin(t * 0.5) * 0.3 + 0.3;
      ax = -dy / dist * 0.5 - dx * s * 0.002;
      ay =  dx / dist * 0.5 - dy * s * 0.002;
    }

    // Mouse repulsion / attraction
    if (mx > 0) {
      const dx = x - mx, dy = y - my;
      const dist2 = dx*dx + dy*dy + 1;
      const force = mouseDown ? -8000 : 5000;
      ax += dx / dist2 * force * 0.0001;
      ay += dy / dist2 * force * 0.0001;
    }

    vx[i] += ax; vy[i] += ay;
    // Damping
    vx[i] *= 0.97; vy[i] *= 0.97;
    posData[i*2]   += vx[i];
    posData[i*2+1] += vy[i];

    // Boundary wrap
    if (posData[i*2]   < -50) posData[i*2]   = W + 50;
    if (posData[i*2]   > W+50) posData[i*2]  = -50;
    if (posData[i*2+1] < -50) posData[i*2+1] = H + 50;
    if (posData[i*2+1] > H+50) posData[i*2+1] = -50;

    // Life cycle
    age[i]++;
    if (age[i] > maxAge[i]) {
      age[i] = 0;
      maxAge[i] = 150 + Math.random() * 250;
    }
    const a = age[i] / maxAge[i];
    lifeData[i] = a < 0.1 ? a * 10 : a > 0.8 ? (1 - a) * 5 : 1;

    // Color shift over time
    hueData[i] += 0.001;
    if (hueData[i] > 1) hueData[i] -= 1;
  }
}

// ─── Upload instance data ─────────────────────────────────────────────────────
function uploadInstanceData() {
  gl.bindBuffer(gl.ARRAY_BUFFER, posBuf);
  gl.bufferData(gl.ARRAY_BUFFER, posData, gl.DYNAMIC_DRAW);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);
  ext.vertexAttribDivisorANGLE(aPos, 1);

  gl.bindBuffer(gl.ARRAY_BUFFER, lifeBuf);
  gl.bufferData(gl.ARRAY_BUFFER, lifeData, gl.DYNAMIC_DRAW);
  gl.vertexAttribPointer(aLife, 1, gl.FLOAT, false, 0, 0);
  ext.vertexAttribDivisorANGLE(aLife, 1);

  gl.bindBuffer(gl.ARRAY_BUFFER, sizeBuf);
  gl.bufferData(gl.ARRAY_BUFFER, sizeData, gl.STATIC_DRAW);
  gl.vertexAttribPointer(aSize, 1, gl.FLOAT, false, 0, 0);
  ext.vertexAttribDivisorANGLE(aSize, 1);

  gl.bindBuffer(gl.ARRAY_BUFFER, hueBuf);
  gl.bufferData(gl.ARRAY_BUFFER, hueData, gl.DYNAMIC_DRAW);
  gl.vertexAttribPointer(aHue, 1, gl.FLOAT, false, 0, 0);
  ext.vertexAttribDivisorANGLE(aHue, 1);
}

// ─── Render loop ─────────────────────────────────────────────────────────────
let t0 = performance.now(), frames = 0, fps = 60, lastFps = 0;
function render() {
  requestAnimationFrame(render);
  const now = performance.now();
  const t = (now - t0) / 1000;
  frames++;
  if (now - lastFps >= 1000) { fps = frames; frames = 0; lastFps = now; }

  simulate(t);
  uploadInstanceData();

  gl.clearColor(0.02, 0.02, 0.06, 0.15);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE);  // additive blending for glow

  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);

  // One draw call renders all N particles (instanced!)
  ext.drawArraysInstancedANGLE(gl.TRIANGLE_STRIP, 0, 4, N);

  document.getElementById('stats').innerHTML = `FPS: ${fps}<br>Particles: ${N.toLocaleString()}`;
}
render();
</script>
</body>
</html>
