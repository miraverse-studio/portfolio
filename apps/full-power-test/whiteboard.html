<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ホワイトボード | Mira</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
* { margin:0;padding:0;box-sizing:border-box; }
body { background:#0f0f1a; overflow:hidden; font-family:'Noto Sans JP',sans-serif; }
canvas#bg  { position:fixed;inset:0;z-index:0; }
canvas#main { position:fixed;inset:0;z-index:1;cursor:crosshair;touch-action:none; }

.toolbar {
  position:fixed; z-index:20; top:14px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:6px; padding:7px 12px;
  background:rgba(15,15,26,0.9); border:1px solid rgba(255,255,255,0.1);
  border-radius:24px; backdrop-filter:blur(12px); flex-wrap:wrap; justify-content:center;
  max-width:95vw;
}
.sep { width:1px; height:20px; background:rgba(255,255,255,0.1); flex-shrink:0; }
.tool-btn {
  padding:5px 10px; border-radius:12px; cursor:pointer; border:1px solid transparent;
  background:transparent; color:rgba(255,255,255,0.5); font-size:14px; transition:all 0.15s;
  font-family:inherit; white-space:nowrap;
}
.tool-btn:hover { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.8); }
.tool-btn.active { background:rgba(124,58,237,0.2); border-color:rgba(124,58,237,0.5); color:#a78bfa; }

.color-swatch {
  width:20px; height:20px; border-radius:50%; cursor:pointer; border:2px solid transparent;
  transition:all 0.15s; flex-shrink:0;
}
.color-swatch.active { border-color:#fff; transform:scale(1.2); }

.size-btn { font-size:18px; cursor:pointer; color:rgba(255,255,255,0.4); padding:2px 6px; border:none; background:none; }
.size-btn:hover { color:#fff; }
.size-disp { font-size:11px; color:rgba(255,255,255,0.4); min-width:20px; text-align:center; font-family:'JetBrains Mono',monospace; }

.bottom-bar {
  position:fixed; z-index:20; bottom:14px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:8px; padding:7px 14px;
  background:rgba(15,15,26,0.85); border:1px solid rgba(255,255,255,0.08);
  border-radius:20px; backdrop-filter:blur(8px);
}
.b-btn {
  font-size:11px; padding:5px 12px; border-radius:12px; cursor:pointer;
  border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.4); font-family:inherit; transition:all 0.2s;
}
.b-btn:hover { color:#fff; }
.b-btn.danger { border-color:rgba(239,68,68,0.3); color:rgba(239,68,68,0.5); }
.b-btn.danger:hover { background:rgba(239,68,68,0.1); color:#f87171; }
.b-btn.save { border-color:rgba(16,185,129,0.3); color:rgba(16,185,129,0.5); }
.b-btn.save:hover { background:rgba(16,185,129,0.08); color:#34d399; }

.back-btn {
  position:fixed; z-index:20; top:14px; left:14px;
  color:rgba(255,255,255,0.3); text-decoration:none; font-size:11px;
  padding:5px 12px; border:1px solid rgba(255,255,255,0.1); border-radius:16px;
  background:rgba(15,15,26,0.8); backdrop-filter:blur(8px);
}

.hint {
  position:fixed; z-index:20; bottom:60px; left:50%; transform:translateX(-50%);
  font-size:10px; color:rgba(255,255,255,0.2); white-space:nowrap;
  font-family:'JetBrains Mono',monospace;
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="main"></canvas>

<a href="index.html" class="back-btn">← HOME</a>

<div class="toolbar" id="toolbar">
  <!-- Tools -->
  <button class="tool-btn active" onclick="setTool('pen',this)" title="ペン">✏️</button>
  <button class="tool-btn" onclick="setTool('eraser',this)" title="消しゴム">⬜</button>
  <button class="tool-btn" onclick="setTool('line',this)" title="直線">╱</button>
  <button class="tool-btn" onclick="setTool('rect',this)" title="長方形">⬡</button>
  <button class="tool-btn" onclick="setTool('circle',this)" title="円">◯</button>
  <button class="tool-btn" onclick="setTool('text',this)" title="テキスト">T</button>
  <div class="sep"></div>
  <!-- Colors -->
  <div id="colorPalette" style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;"></div>
  <div class="sep"></div>
  <!-- Stroke size -->
  <button class="size-btn" onclick="changeSize(-2)">−</button>
  <div class="size-disp" id="sizeDisp">4</div>
  <button class="size-btn" onclick="changeSize(2)">+</button>
</div>

<div class="bottom-bar">
  <button class="b-btn" onclick="undo()">↩ Undo</button>
  <button class="b-btn" onclick="redo()">↪ Redo</button>
  <button class="b-btn" onclick="clearCanvas()" class="danger">🗑 クリア</button>
  <button class="b-btn save" onclick="saveImage()">💾 PNG保存</button>
</div>

<div class="hint">ドラッグで描画 · スペース+ドラッグ でパン移動</div>

<script>
const bgCanvas  = document.getElementById('bg');
const mainCanvas = document.getElementById('main');
const bgCtx = bgCanvas.getContext('2d');
const ctx   = mainCanvas.getContext('2d');

// ─── Colors ───────────────────────────────────────────────────────────────────
const COLORS = ['#ffffff','#f87171','#fb923c','#fbbf24','#4ade80','#38bdf8','#a78bfa','#f472b6','#94a3b8','#000000'];
let currentColor = '#ffffff';
let strokeSize = 4;
let tool = 'pen';

const palette = document.getElementById('colorPalette');
COLORS.forEach(c => {
  const div = document.createElement('div');
  div.className = 'color-swatch' + (c === currentColor ? ' active' : '');
  div.style.background = c;
  div.onclick = () => {
    currentColor = c;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    div.classList.add('active');
  };
  palette.appendChild(div);
});

function setTool(t, btn) {
  tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  mainCanvas.style.cursor = t === 'eraser' ? 'cell' : t === 'text' ? 'text' : 'crosshair';
}
window.setTool = setTool;

function changeSize(d) {
  strokeSize = Math.max(1, Math.min(64, strokeSize + d));
  document.getElementById('sizeDisp').textContent = strokeSize;
}
window.changeSize = changeSize;

// ─── Canvas / viewport ────────────────────────────────────────────────────────
let W, H;
let panX = 0, panY = 0;

// The "board" canvas — what we actually draw on
const board = document.createElement('canvas');
const bCtx  = board.getContext('2d');

function resize() {
  W = bgCanvas.width = mainCanvas.width = window.innerWidth;
  H = bgCanvas.height = mainCanvas.height = window.innerHeight;
  board.width  = W * 3;
  board.height = H * 3;
  bCtx.fillStyle = '#0f0f1a';
  bCtx.fillRect(0, 0, board.width, board.height);
  drawGrid();
  redraw();
}
window.addEventListener('resize', resize);

function drawGrid() {
  const GRID = 40;
  bCtx.strokeStyle = 'rgba(255,255,255,0.04)';
  bCtx.lineWidth = 1;
  for (let x = 0; x < board.width; x += GRID) {
    bCtx.beginPath(); bCtx.moveTo(x,0); bCtx.lineTo(x,board.height); bCtx.stroke();
  }
  for (let y = 0; y < board.height; y += GRID) {
    bCtx.beginPath(); bCtx.moveTo(0,y); bCtx.lineTo(board.width,y); bCtx.stroke();
  }
  // Center cross
  bCtx.strokeStyle = 'rgba(124,58,237,0.15)';
  bCtx.lineWidth = 1;
  const cx = board.width/2, cy = board.height/2;
  bCtx.beginPath(); bCtx.moveTo(cx-20,cy); bCtx.lineTo(cx+20,cy); bCtx.stroke();
  bCtx.beginPath(); bCtx.moveTo(cx,cy-20); bCtx.lineTo(cx,cy+20); bCtx.stroke();
}

function redraw() {
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(board, panX, panY);
  // Draw preview shape if dragging
  if (isDrawing && (tool==='line'||tool==='rect'||tool==='circle')) {
    drawShapePreview();
  }
}

// ─── Undo/Redo stack ──────────────────────────────────────────────────────────
const MAX_UNDO = 40;
let undoStack = [];
let redoStack = [];

function snapshot() {
  undoStack.push(bCtx.getImageData(0, 0, board.width, board.height));
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack = [];
}

function undo() {
  if (!undoStack.length) return;
  redoStack.push(bCtx.getImageData(0, 0, board.width, board.height));
  bCtx.putImageData(undoStack.pop(), 0, 0);
  redraw();
}
window.undo = undo;

function redo() {
  if (!redoStack.length) return;
  undoStack.push(bCtx.getImageData(0, 0, board.width, board.height));
  bCtx.putImageData(redoStack.pop(), 0, 0);
  redraw();
}
window.redo = redo;

function clearCanvas() {
  if (!confirm('ホワイトボードを消去しますか？')) return;
  snapshot();
  bCtx.fillStyle = '#0f0f1a';
  bCtx.fillRect(0, 0, board.width, board.height);
  drawGrid();
  redraw();
}
window.clearCanvas = clearCanvas;

function saveImage() {
  const a = document.createElement('a');
  // Export only the visible area
  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const tmpCtx = tmp.getContext('2d');
  tmpCtx.drawImage(board, panX, panY, W, H, 0, 0, W, H);
  a.href = tmp.toDataURL('image/png');
  a.download = 'whiteboard.png';
  a.click();
}
window.saveImage = saveImage;

// ─── Input handling ───────────────────────────────────────────────────────────
let isDrawing = false;
let isPanning = false;
let spaceDown = false;
let lastX = 0, lastY = 0;
let startX = 0, startY = 0;  // for shapes
let previewSnap = null;

function clientToBoardX(cx) { return cx - panX; }
function clientToBoardY(cy) { return cy - panY; }

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { spaceDown = true; mainCanvas.style.cursor = 'grab'; e.preventDefault(); }
  if ((e.metaKey||e.ctrlKey) && e.key === 'z') { e.shiftKey ? redo() : undo(); }
  if ((e.metaKey||e.ctrlKey) && e.key === 'y') { redo(); }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') { spaceDown = false; mainCanvas.style.cursor = 'crosshair'; }
});

function getPos(e) {
  if (e.touches) {
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  return { x: e.clientX, y: e.clientY };
}

mainCanvas.addEventListener('pointerdown', e => {
  const p = getPos(e);
  if (spaceDown || e.button === 1 || e.button === 2) {
    isPanning = true;
    lastX = p.x; lastY = p.y;
    mainCanvas.style.cursor = 'grabbing';
    return;
  }
  if (tool === 'text') {
    const bx = clientToBoardX(p.x), by = clientToBoardY(p.y);
    const txt = prompt('テキストを入力:');
    if (!txt) return;
    snapshot();
    bCtx.fillStyle = currentColor;
    bCtx.font = `${Math.max(14,strokeSize*3)}px Noto Sans JP, sans-serif`;
    bCtx.fillText(txt, bx, by);
    redraw();
    return;
  }

  isDrawing = true;
  const bx = clientToBoardX(p.x), by = clientToBoardY(p.y);
  startX = bx; startY = by;
  lastX = p.x; lastY = p.y;

  if (tool === 'pen' || tool === 'eraser') {
    snapshot();
    bCtx.beginPath();
    bCtx.moveTo(bx, by);
  } else {
    previewSnap = bCtx.getImageData(0, 0, board.width, board.height);
  }
});

mainCanvas.addEventListener('pointermove', e => {
  const p = getPos(e);
  if (isPanning) {
    panX += p.x - lastX;
    panY += p.y - lastY;
    panX = Math.min(0, Math.max(W - board.width, panX));
    panY = Math.min(0, Math.max(H - board.height, panY));
    lastX = p.x; lastY = p.y;
    redraw(); return;
  }
  if (!isDrawing) return;

  const bx = clientToBoardX(p.x), by = clientToBoardY(p.y);

  if (tool === 'pen') {
    bCtx.strokeStyle = currentColor;
    bCtx.lineWidth = strokeSize;
    bCtx.lineCap = 'round'; bCtx.lineJoin = 'round';
    bCtx.lineTo(bx, by);
    bCtx.stroke();
    bCtx.beginPath(); bCtx.moveTo(bx, by);
  } else if (tool === 'eraser') {
    bCtx.strokeStyle = '#0f0f1a';
    bCtx.lineWidth = strokeSize * 3;
    bCtx.lineCap = 'round'; bCtx.lineJoin = 'round';
    bCtx.lineTo(bx, by);
    bCtx.stroke();
    bCtx.beginPath(); bCtx.moveTo(bx, by);
  } else {
    // Shape preview
    lastX = p.x; lastY = p.y;
  }
  redraw();
});

mainCanvas.addEventListener('pointerup', e => {
  if (isPanning) {
    isPanning = false;
    mainCanvas.style.cursor = spaceDown ? 'grab' : 'crosshair';
    return;
  }
  if (!isDrawing) return;
  isDrawing = false;

  const p = getPos(e);
  const bx = clientToBoardX(p.x), by = clientToBoardY(p.y);

  if (tool === 'line' || tool === 'rect' || tool === 'circle') {
    if (previewSnap) bCtx.putImageData(previewSnap, 0, 0);
    bCtx.strokeStyle = currentColor;
    bCtx.lineWidth = strokeSize;
    bCtx.lineCap = 'round';
    bCtx.beginPath();
    if (tool === 'line') {
      bCtx.moveTo(startX, startY); bCtx.lineTo(bx, by);
      bCtx.stroke();
    } else if (tool === 'rect') {
      bCtx.strokeRect(startX, startY, bx-startX, by-startY);
    } else if (tool === 'circle') {
      const rx = Math.abs(bx-startX)/2, ry = Math.abs(by-startY)/2;
      const cx = Math.min(startX,bx)+rx, cy = Math.min(startY,by)+ry;
      bCtx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
      bCtx.stroke();
    }
    previewSnap = null;
    undoStack.push(bCtx.getImageData(0,0,board.width,board.height));
    if (undoStack.length > MAX_UNDO) undoStack.shift();
  }
  redraw();
});

mainCanvas.addEventListener('touchstart', e => { e.preventDefault(); mainCanvas.dispatchEvent(new PointerEvent('pointerdown', { clientX:e.touches[0].clientX, clientY:e.touches[0].clientY })); }, {passive:false});
mainCanvas.addEventListener('touchmove',  e => { e.preventDefault(); mainCanvas.dispatchEvent(new PointerEvent('pointermove', { clientX:e.touches[0].clientX, clientY:e.touches[0].clientY })); }, {passive:false});
mainCanvas.addEventListener('touchend',   e => { e.preventDefault(); mainCanvas.dispatchEvent(new PointerEvent('pointerup',   { clientX:(e.changedTouches[0]||{clientX:0}).clientX, clientY:(e.changedTouches[0]||{clientY:0}).clientY })); }, {passive:false});

function drawShapePreview() {
  const bx = clientToBoardX(lastX), by = clientToBoardY(lastY);
  ctx.strokeStyle = currentColor;
  ctx.lineWidth = strokeSize;
  ctx.setLineDash([5,5]);
  ctx.globalAlpha = 0.7;
  ctx.beginPath();
  if (tool === 'line') {
    ctx.moveTo(startX + panX, startY + panY);
    ctx.lineTo(bx + panX, by + panY);
    ctx.stroke();
  } else if (tool === 'rect') {
    const sx = startX+panX, sy = startY+panY;
    ctx.strokeRect(sx, sy, bx-startX, by-startY);
  } else if (tool === 'circle') {
    const rx = Math.abs(bx-startX)/2, ry = Math.abs(by-startY)/2;
    const cx = Math.min(startX,bx)+rx+panX, cy = Math.min(startY,by)+ry+panY;
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
resize();
panX = -Math.floor((board.width - W) / 2);
panY = -Math.floor((board.height - H) / 2);
redraw();
</script>
</body>
</html>
